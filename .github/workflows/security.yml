name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sast-and-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime and security tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Bandit (src + scripts)
        run: bandit -r src scripts -ll

      - name: pip-audit (pinned runtime deps)
        run: pip-audit .